name: Deploy and Publish Workflow

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Build static site
        run: npm run build
        env:
          VITE_APP_URL: ${{ secrets.VITE_APP_URL || 'https://ais-pre-z3hew5j5hifpwf3xncczcz-381177456753.asia-northeast1.run.app' }}

      # 💡 Note on Deployment:
